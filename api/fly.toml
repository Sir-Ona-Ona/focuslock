# fly.toml — FocusLock API
app            = 'focus-lock'
primary_region = 'lhr'

[build]

[env]
  DATABASE_URL = '/data/focuslock.db'
  NODE_ENV     = 'production'
  PORT         = '3000'

[[mounts]]
  source      = 'focuslock_data'
  destination = '/data'

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval   = "30s"
    timeout    = "5s"
    grace_period = "10s"
    method     = "GET"
    path       = "/health"

[[vm]]
  memory   = '256mb'
  cpu_kind = 'shared'
  cpus     = 1
