<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>FocusLock · Options</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
  body {
    min-height: 100vh;
    background: #F4F7FB;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #0D1F3C;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 48px 24px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { width: 100%; max-width: 520px }

  .head { margin-bottom: 32px }
  .seal {
    width: 48px; height: 48px; border-radius: 10px;
    background: #0D1F3C; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-style: italic; font-size: 24px; font-family: Georgia, serif;
    margin-bottom: 16px;
  }
  .eyebrow {
    font-size: 10px; font-weight: 700; letter-spacing: .2em;
    text-transform: uppercase; color: #4A6FA5; margin-bottom: 8px;
  }
  h1 { font-size: 28px; font-weight: 700; line-height: 1.15; color: #0D1F3C; letter-spacing: -.02em }
  .sub { font-size: 14px; color: #1A3A6B; line-height: 1.55; margin-top: 10px }

  .card {
    background: #fff; border: 1px solid #C8D6EA;
    border-radius: 8px; padding: 32px;
    margin-top: 24px;
    box-shadow: 0 1px 4px rgba(13,31,60,.06);
  }

  label { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px }
  .label-text {
    font-size: 11px; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: #4A6FA5;
  }
  input[type=email], input[type=password], input[type=url] {
    border: 1px solid #C8D6EA; border-radius: 4px; outline: none;
    background: #fff; width: 100%;
    font-family: 'SF Mono', 'Courier New', monospace; font-size: 14px; color: #0D1F3C;
    padding: 10px 12px;
    transition: border-color .15s;
  }
  input:focus { border-color: #0D1F3C }

  .btn {
    background: #0D1F3C; color: #fff; border: none; border-radius: 6px;
    cursor: pointer; width: 100%; padding: 13px;
    font-size: 13px; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; margin-top: 8px;
    transition: background .15s;
  }
  .btn:hover { background: #1A3A6B }
  .btn:disabled { opacity: .5; cursor: default }
  .btn-ghost {
    background: none; border: 1px solid #B91C1C; color: #B91C1C;
    border-radius: 6px; cursor: pointer; padding: 10px 20px;
    font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    transition: background .15s;
  }
  .btn-ghost:hover { background: #FEF2F2 }

  .error {
    border-left: 3px solid #B91C1C; padding: 10px 14px;
    background: #FEF2F2; border-radius: 0 4px 4px 0;
    font-size: 13px; color: #B91C1C; margin-bottom: 16px; display: none;
  }
  .error.show { display: block }

  hr { border: none; border-top: 1px solid #C8D6EA; margin: 24px 0 }

  #state-auth { display: none }
  #state-login { display: block }

  .domain-list { border: 1px solid #C8D6EA; border-radius: 6px; background: #fff; overflow: hidden }
  .domain-item {
    padding: 10px 14px; border-bottom: 1px solid #C8D6EA;
    font-family: 'SF Mono', 'Courier New', monospace; font-size: 12px;
    display: flex; align-items: center; gap: 10px; color: #0D1F3C;
  }
  .domain-item:last-child { border-bottom: none }

  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0 }

  #partner-info { font-size: 13px; color: #1A3A6B; line-height: 1.5 }

  .hint { font-size: 11px; color: #4A6FA5; margin-top: 4px; line-height: 1.5 }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="seal">F</div>
    <div class="eyebrow">FocusLock · Extension Options</div>
    <h1>Connect your account.</h1>
    <div class="sub">Sign in to sync your blocked domains and schedule automatically.</div>
  </div>

  <!-- Login form -->
  <div id="state-login">
    <div class="card">
      <div class="error" id="login-error"></div>
      <label>
        <span class="label-text">Email</span>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </label>
      <label>
        <span class="label-text">Password</span>
        <input type="password" id="password" placeholder="········" autocomplete="current-password" />
      </label>
      <button class="btn" id="login-btn">Sign in</button>

      <hr />

      <label>
        <span class="label-text">API URL (optional)</span>
        <input type="url" id="api-url" placeholder="https://focus-lock.fly.dev" />
      </label>
      <div class="hint">Only change this if you are self-hosting the FocusLock API.</div>
    </div>
  </div>

  <!-- Signed-in state -->
  <div id="state-auth">
    <div class="card">
      <div class="eyebrow" style="margin-bottom:8px">Signed in as</div>
      <div style="font-size:20px;font-weight:700;color:#0D1F3C" id="auth-name"></div>
      <div style="font-family:'SF Mono','Courier New',monospace;font-size:12px;color:#4A6FA5;margin-top:4px" id="auth-email"></div>

      <hr />

      <div class="eyebrow" style="margin-bottom:12px">Blocked domains</div>
      <div class="domain-list" id="domain-list">
        <div class="domain-item" style="color:#4A6FA5">Loading…</div>
      </div>

      <hr />

      <div class="eyebrow" style="margin-bottom:10px">Partner</div>
      <div id="partner-info">Loading…</div>

      <hr />

      <div style="display:flex;align-items:center;justify-content:space-between;gap:16px">
        <button class="btn" id="sync-btn" style="margin-top:0">↺ Sync now</button>
        <button class="btn-ghost" id="logout-btn">Sign out</button>
      </div>
    </div>
  </div>
</div>

<script src="options.js"></script>
</body>
</html>
